name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true
  CONFIGURATION: Release
  PACKAGE_VERSION: 1.0.0

jobs:
  build-test-pack:
    name: Build, test, and pack
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore NuGetLicenseEnricher.slnx

      - name: Build
        run: >-
          dotnet build NuGetLicenseEnricher.slnx
          --configuration "$CONFIGURATION"
          --no-restore

      - name: Test
        run: >-
          dotnet test NuGetLicenseEnricher.slnx
          --configuration "$CONFIGURATION"
          --no-build
          --logger "trx;LogFileName=tests.trx"
          --results-directory TestResults

      - name: Pack .NET tool
        run: >-
          dotnet pack NuGetLicenseEnricher/NuGetLicenseEnricher.csproj
          --configuration "$CONFIGURATION"
          --no-build
          -p:PackageVersion="$PACKAGE_VERSION"
          --output artifacts/packages

      - name: Install packaged tool
        run: >-
          dotnet tool install
          --tool-path "$RUNNER_TEMP/nuget-license-tools"
          --add-source artifacts/packages
          NuGetLicenseEnricher.Tool
          --version "$PACKAGE_VERSION"

      - name: Smoke-test packaged tool
        run: >-
          "$RUNNER_TEMP/nuget-license-tools/nuget-license-enricher"
          --input samples/bom.enriched.json
          --output "$RUNNER_TEMP/bom.roundtrip.json"
